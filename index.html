<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kanban Bord</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <!-- ── Topbar ── -->
        <header class="topbar">
            <div class="topbar-inner">

                <div class="brand">
                    <div class="brand-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <rect x="3" y="3" width="7" height="7" rx="1.5" />
                            <rect x="14" y="3" width="7" height="7" rx="1.5" />
                            <rect x="3" y="14" width="7" height="7" rx="1.5" />
                            <rect x="14" y="14" width="7" height="7" rx="1.5" />
                        </svg>
                    </div>
                    <span class="brand-name">Quadro Kanban</span>
                </div>

                <div class="topbar-stats">
                    <div class="stat-chip chip-todo">
                        <span class="chip-dot"></span>
                        <span id="stat-todo">0</span>&nbsp;A fazer
                    </div>
                    <div class="stat-chip chip-prog">
                        <span class="chip-dot"></span>
                        <span id="stat-prog">0</span>&nbsp;Em progresso
                    </div>
                    <div class="stat-chip chip-done">
                        <span class="chip-dot"></span>
                        <span id="stat-done">0</span>&nbsp;Concluídas
                    </div>
                </div>

            </div>
        </header>

        <!-- ── Board ── -->
        <main class="board-wrap">
            <div class="kb-board" id="board"></div>
        </main>

        <!-- ── Modal Nova Tarefa ── -->
        <div id="modal-bg" class="modal-overlay" role="dialog" aria-modal="true"
            aria-labelledby="modal-title">
            <div class="modal">
                <div class="modal-head">
                    <div class="modal-icon-wrap new-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19" /><line x1="5"
                                y1="12" x2="19" y2="12" />
                        </svg>
                    </div>
                    <h3 id="modal-title" class="modal-title">Nova tarefa</h3>
                    <button class="modal-close-btn" onclick="closeModal()"
                        aria-label="Fechar modal">
                        <svg width="14" height="14" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6"
                                y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <div class="modal-body">
                    <div class="field">
                        <label class="field-label" for="f-title">Título <span
                                class="req-mark">*</span></label>
                        <input class="field-input" id="f-title" type="text"
                            placeholder="Ex: Criar protótipo de tela"
                            autocomplete="off" />
                    </div>
                    <div class="field">
                        <label class="field-label"
                            for="f-desc">Descrição</label>
                        <textarea class="field-input field-textarea" id="f-desc"
                            placeholder="Detalhes da tarefa (opcional)"></textarea>
                    </div>
                    <div class="field">
                        <label class="field-label">Prioridade</label>
                        <div class="prio-row" id="prio-selector">
                            <button class="prio-btn active"
                                data-prio="alta"><span
                                    class="pip alta"></span>Alta</button>
                            <button class="prio-btn" data-prio="media"><span
                                    class="pip media"></span>Média</button>
                            <button class="prio-btn" data-prio="baixa"><span
                                    class="pip baixa"></span>Baixa</button>
                        </div>
                    </div>
                </div>

                <div class="modal-foot">
                    <button class="btn btn-ghost"
                        onclick="closeModal()">Cancelar</button>
                    <button class="btn btn-primary" onclick="saveTask()">
                        <svg width="13" height="13" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5"><polyline
                                points="20 6 9 17 4 12" /></svg>
                        Criar tarefa
                    </button>
                </div>
            </div>
        </div>

        <!-- ── Modal Editar Tarefa ── -->
        <div id="edit-modal-bg" class="modal-overlay" role="dialog"
            aria-modal="true" aria-labelledby="edit-modal-title">
            <div class="modal">
                <div class="modal-head">
                    <div class="modal-icon-wrap edit-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path
                                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path
                                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                    </div>
                    <h3 id="edit-modal-title" class="modal-title">Editar
                        tarefa</h3>
                    <button class="modal-close-btn" onclick="closeEditModal()"
                        aria-label="Fechar modal">
                        <svg width="14" height="14" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6"
                                y1="6" x2="18" y2="18" />
                        </svg>
                    </button>
                </div>

                <div class="modal-body">
                    <div class="field">
                        <label class="field-label" for="ef-title">Título <span
                                class="req-mark">*</span></label>
                        <input class="field-input" id="ef-title" type="text"
                            autocomplete="off" />
                    </div>
                    <div class="field">
                        <label class="field-label"
                            for="ef-desc">Descrição</label>
                        <textarea class="field-input field-textarea"
                            id="ef-desc"></textarea>
                    </div>
                    <div class="field">
                        <label class="field-label">Prioridade</label>
                        <div class="prio-row" id="edit-prio-selector">
                            <button class="prio-btn" data-prio="alta"><span
                                    class="pip alta"></span>Alta</button>
                            <button class="prio-btn" data-prio="media"><span
                                    class="pip media"></span>Média</button>
                            <button class="prio-btn" data-prio="baixa"><span
                                    class="pip baixa"></span>Baixa</button>
                        </div>
                    </div>
                </div>

                <div class="modal-foot">
                    <button class="btn btn-ghost"
                        onclick="closeEditModal()">Cancelar</button>
                    <button class="btn btn-primary" onclick="saveEdit()">
                        <svg width="13" height="13" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor"
                            stroke-width="2.5"><polyline
                                points="20 6 9 17 4 12" /></svg>
                        Salvar
                    </button>
                </div>
            </div>
        </div>

        <!-- ── Context Menu ── -->
        <div id="ctx-menu" class="ctx-menu" role="menu">
            <button class="ctx-item" role="menuitem" onclick="ctxEdit()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path
                        d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path
                        d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>Editar
            </button>
            <button class="ctx-item" id="ctx-left-btn" role="menuitem"
                onclick="ctxMove(-1)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"><polyline
                        points="15 18 9 12 15 6" /></svg>
                Mover para esquerda
            </button>
            <button class="ctx-item" id="ctx-right-btn" role="menuitem"
                onclick="ctxMove(1)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"><polyline
                        points="9 18 15 12 9 6" /></svg>
                Mover para direita
            </button>
            <div class="ctx-sep"></div>
            <button class="ctx-item ctx-danger" role="menuitem"
                onclick="ctxDelete()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6" />
                    <path d="M19 6l-1 14H6L5 6" /><path d="M10 11v6" /><path
                        d="M14 11v6" />
                </svg>Excluir
            </button>
        </div>

        <script src="script.js"></script>
    </body>
</html>
